<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>AFK Arena Companions Hub</title>
    <script type="text/javascript">
      // GitHub Pages has no server-side routing, so a deep link like
      // /team-builder 404s. This redirects it to index.html with the
      // real path encoded in the query string, which index.html then
      // decodes and restores via history.replaceState before React
      // Router boots. See https://github.com/rafgraph/spa-github-pages.
      var pathSegmentsToKeep = 1

      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
